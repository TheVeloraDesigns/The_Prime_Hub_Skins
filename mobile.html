<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizer — Prime Skin Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0A0A0A;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── TOP NAV ─── */
        .top-nav {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, var(--dark), transparent);
        }

        .back-btn { color: #fff; text-decoration: none; font-size: 20px; }

        /* ─── MAIN PREVIEW ─── */
        .visualizer-stage {
            height: 70vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-top: 60px;
        }

        .phone-container {
            position: relative;
            width: 220px;
            height: 450px;
            background: #111;
            border-radius: 40px;
            border: 8px solid #222;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 40px rgba(212, 175, 55, 0.1);
            overflow: hidden;
        }

        .skin-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .phone-frame {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background-image: url('https://i.imgur.com/your-transparent-iphone-frame.png'); /* Replace with your PNG */
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* ─── SELECTION DRAWER ─── */
        .bottom-drawer {
            width: 100%;
            max-width: 500px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            border-radius: 30px 30px 0 0;
            padding: 30px 20px;
            position: fixed;
            bottom: 0;
            z-index: 10;
        }

        .section-header {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .option-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }

        .option-card {
            min-width: 100px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .option-card.active {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
        }

        .price-text { font-family: 'Syne'; font-size: 24px; color: var(--gold); }

        .cta-button {
            background: var(--gold);
            color: #000;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: 'Syne';
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn"><i class="ti ti-chevron-left"></i></a>
        <div style="font-family:'Syne'; letter-spacing: 2px;">PRIME</div>
        <i class="ti ti-shopping-cart" style="font-size: 20px;"></i>
    </div>

    <div class="visualizer-stage">
        <div class="phone-container">
            <div id="activeSkin" class="skin-layer" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800');"></div>
            <div class="phone-frame"></div>
        </div>
    </div>

    <div class="bottom-drawer">
        <div id="brandStep">
            <div class="section-header">Select Brand</div>
            <div class="option-scroll" id="brandGrid"></div>
        </div>

        <div id="skinStep" style="margin-top: 25px;">
            <div class="section-header">Choose Texture</div>
            <div class="option-scroll" id="skinGrid"></div>
        </div>

        <div class="price-row">
            <div>
                <div style="font-size: 10px; opacity: 0.5; text-transform: uppercase;">Total Price</div>
                <div class="price-text" id="priceLabel">₹999</div>
            </div>
            <button class="cta-button">ADD TO CART</button>
        </div>
    </div>

<script>
    const DATA = {
        brands: [
            { id: 'apple', name: 'Apple', price: 999 },
            { id: 'samsung', name: 'Samsung', price: 1199 },
            { id: 'google', name: 'Google', price: 899 }
        ],
        skins: [
            { id: 'gold', name: 'Liquid Gold', img: 'https://images.unsplash.com/photo-1502691876148-a84978e59af8?w=800' },
            { id: 'carbon', name: 'Carbon Fiber', img: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800' },
            { id: 'marble', name: 'White Marble', img: 'https://images.unsplash.com/photo-1533154683836-84ea7a0bc310?w=800' }
        ]
    };

    function init() {
        const brandGrid = document.getElementById('brandGrid');
        brandGrid.innerHTML = DATA.brands.map(b => `
            <div class="option-card" onclick="setBrand('${b.id}', ${b.price}, this)">
                <div style="font-size: 12px; font-weight: 500;">${b.name}</div>
            </div>
        `).join('');

        const skinGrid = document.getElementById('skinGrid');
        skinGrid.innerHTML = DATA.skins.map(s => `
            <div class="option-card" onclick="setSkin('${s.img}', this)">
                <div style="width:40px; height:40px; border-radius:50%; background:url('${s.img}'); background-size:cover; margin: 0 auto 10px;"></div>
                <div style="font-size: 10px;">${s.name}</div>
            </div>
        `).join('');
    }

    function setBrand(id, price, el) {
        document.querySelectorAll('#brandGrid .option-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('priceLabel').innerText = '₹' + price;
    }

    function setSkin(imgUrl, el) {
        document.querySelectorAll('#skinGrid .option-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('activeSkin').style.backgroundImage = `url('${imgUrl}')`;
    }

    init();
</script>
</body>
</html>
