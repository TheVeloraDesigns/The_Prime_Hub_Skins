<style>
  :root {
    --gold: #C4A484;
    --dark: #080808;
    --card-bg: #111111;
    --border: rgba(255,255,255,0.08);
    --text-dim: #888;
  }

  body { 
    background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
    margin: 0; display: flex; justify-content: center; overflow-x: hidden;
  }

  .app-container {
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px;
    width: 100%; max-width: 1100px; padding: 40px 20px;
  }

  /* LEFT: STICKY PREVIEW */
  .visualizer-pane { position: sticky; top: 40px; height: fit-content; text-align: center; }
  
  .phone-mockup {
    width: 260px; height: 530px; background: #000; border: 10px solid #1a1a1a;
    border-radius: 45px; margin: 0 auto; position: relative; overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
  }

  #active-skin {
    position: absolute; inset: 0; background-size: cover; 
    background-position: center; transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1);
  }

  /* RIGHT: SELECTION ENGINE */
  .selection-pane { padding-bottom: 100px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin: 30px 0 15px; font-weight: 700; }
  
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    padding: 20px; border-radius: 16px; cursor: pointer; transition: 0.3s;
    text-align: center; font-weight: 500; font-size: 14px;
  }

  .card:hover { border-color: var(--gold); background: rgba(196, 164, 132, 0.05); }
  .card.active { border-color: var(--gold); background: var(--gold); color: #000; }

  .texture-card {
    height: 80px; border-radius: 16px; position: relative; overflow: hidden;
    border: 2px solid transparent; background-size: cover;
  }
  .texture-card.active { border-color: var(--gold); transform: scale(0.98); }
  .texture-name { position: absolute; bottom: 8px; width: 100%; font-size: 10px; text-transform: uppercase; font-weight: 800; background: rgba(0,0,0,0.4); }

  .cta-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,8,0.9);
    backdrop-filter: blur(20px); padding: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: center; z-index: 100;
  }
  .buy-btn {
    width: 100%; max-width: 400px; background: var(--gold); color: #000;
    border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer;
  }

  @media (max-width: 850px) {
    .app-container { grid-template-columns: 1fr; }
    .visualizer-pane { position: relative; top: 0; margin-bottom: 40px; }
  }
</style>

<div class="app-container">
  <div class="visualizer-pane">
    <div class="phone-mockup">
      <div id="active-skin" style="background-color: #222;"></div>
    </div>
    <h2 id="display-model" style="margin-top:20px; font-size: 20px;">Select Device</h2>
    <p id="display-skin" style="color: var(--text-dim); font-size: 14px;">Original Finish</p>
  </div>

  <div class="selection-pane">
    <h1 style="font-size: 32px; margin: 0;">Prime Skin Hub</h1>
    <p style="color: var(--text-dim); margin-bottom: 40px;">Hardware Visualizer v1.0</p>

    <div class="section-label">01. Choose Brand</div>
    <div class="grid" id="brand-grid"></div>

    <div class="section-label">02. Choose Model</div>
    <div class="grid" id="model-grid"></div>

    <div class="section-label">03. Select Series</div>
    <div class="grid" id="skin-grid"></div>
  </div>
</div>

<div class="cta-bar">
  <button class="buy-btn">Confirm Configuration — ₹999</button>
</div>

<script>
const DB = {
  brands: [
    { id: 'apple', name: 'Apple', models: ['iPhone 15 Pro', 'iPhone 15 Pro Max'] },
    { id: 'samsung', name: 'Samsung', models: ['Galaxy S24 Ultra', 'Galaxy S23 Ultra'] },
    { id: 'google', name: 'Google', models: ['Pixel 8 Pro', 'Pixel 7 Pro'] }
  ],
  skins: [
    { name: 'Carbon Fiber', color: '#1a1a1a', img: 'https://www.transparenttextures.com/patterns/carbon-fibre.png' },
    { name: 'Titanium Gold', color: '#C4A484', img: 'https://www.transparenttextures.com/patterns/brushed-alum.png' }
  ]
};

let current = { brand: null, model: null, skin: null };

function init() {
  renderBrands();
  renderSkins();
}

function renderBrands() {
  document.getElementById('brand-grid').innerHTML = DB.brands.map(b => `
    <div class="card ${current.brand === b.id ? 'active' : ''}" onclick="setBrand('${b.id}')">${b.name}</div>
  `).join('');
}

function setBrand(id) {
  current.brand = id;
  current.model = null;
  renderBrands();
  const brand = DB.brands.find(b => b.id === id);
  document.getElementById('model-grid').innerHTML = brand.models.map(m => `
    <div class="card ${current.model === m ? 'active' : ''}" onclick="setModel('${m}')">${m}</div>
  `).join('');
}

function setModel(name) {
  current.model = name;
  document.getElementById('display-model').innerText = name;
  setBrand(current.brand); // Refresh model active state
}

function renderSkins() {
  document.getElementById('skin-grid').innerHTML = DB.skins.map(s => `
    <div class="texture-card" style="background-color: ${s.color}; background-image: url('${s.img}')" onclick="setSkin('${s.name}', '${s.color}', '${s.img}')">
      <div class="texture-name">${s.name}</div>
    </div>
  `).join('');
}

function setSkin(name, color, img) {
  const el = document.getElementById('active-skin');
  el.style.backgroundColor = color;
  el.style.backgroundImage = `url('${img}')`;
  document.getElementById('display-skin').innerText = name;
}

init();
</script>
