<style>
  :root {
    --gold: #C4A484;
    --dark: #080808;
    --card-bg: #111;
    --border: rgba(255,255,255,0.1);
  }

  body { background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; }
  .app-container { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; width: 100%; max-width: 1100px; padding: 40px 20px; }

  /* PREVIEW SYSTEM */
  .visualizer-pane { position: sticky; top: 40px; height: fit-content; text-align: center; }
  
  .phone-container {
    width: 300px; height: 600px; margin: 0 auto; position: relative;
    background-size: contain; background-repeat: no-repeat; background-position: center;
  }

  /* This layer holds the skin texture */
  #skin-layer {
    position: absolute;
    top: 10%; left: 10%; width: 80%; height: 80%; /* Adjusted to fit inside the phone body */
    background-size: cover;
    mix-blend-mode: multiply; /* This keeps the phone shadows/details visible */
    transition: 0.4s ease;
    border-radius: 20px;
    opacity: 0.9;
  }

  /* SELECTION UI */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .card { 
    background: var(--card-bg); border: 1px solid var(--border); padding: 15px; 
    border-radius: 12px; cursor: pointer; text-align: center; transition: 0.2s;
  }
  .card.active { border-color: var(--gold); background: rgba(196, 164, 132, 0.1); }
  
  .texture-card {
    height: 60px; border-radius: 10px; border: 2px solid transparent; 
    background-size: cover; cursor: pointer;
  }
  .texture-card.active { border-color: var(--gold); }
</style>

<div class="app-container">
  <div class="visualizer-pane">
    <div id="phone-display" class="phone-container">
        <div id="skin-layer"></div>
    </div>
    <h2 id="model-name">Select Model</h2>
  </div>

  <div class="selection-pane">
    <h1>Prime Skin Hub</h1>
    
    <div class="label">Brand</div>
    <div class="grid" id="brand-grid"></div>

    <div class="label">Model</div>
    <div class="grid" id="model-grid"></div>

    <div class="label">Skin Texture</div>
    <div class="grid" id="skin-grid"></div>
  </div>
</div>

<script>
const DB = {
  brands: [
    { id: 'apple', name: 'Apple', models: [
        { name: 'iPhone 15 Pro', img: 'image_d2711a.png' },
        { name: 'iPhone 15 Pro Max', img: 'image_d2711a.png' }
    ]},
    { id: 'samsung', name: 'Samsung', models: [
        { name: 'S24 Ultra', img: 'image_d269b7.png' },
        { name: 'S23 Ultra', img: 'image_d269b7.png' }
    ]},
    { id: 'google', name: 'Google', models: [
        { name: 'Pixel 8 Pro', img: 'image_d26656.png' },
        { name: 'Pixel 7 Pro', img: 'image_d265fd.png' }
    ]}
  ],
  skins: [
    { name: 'Carbon Fibre', img: 'download.jpg' },
    { name: 'Titanium Gold', img: 'Screenshot 2026-05-16 at 12.29.58 AM.png' }
  ]
};

function init() {
  const brandGrid = document.getElementById('brand-grid');
  brandGrid.innerHTML = DB.brands.map(b => `<div class="card" onclick="selectBrand('${b.id}')">${b.name}</div>`).join('');
  
  const skinGrid = document.getElementById('skin-grid');
  skinGrid.innerHTML = DB.skins.map(s => `
    <div class="texture-card" style="background-image: url('${s.img}')" onclick="applySkin('${s.img}')"></div>
  `).join('');
}

function selectBrand(brandId) {
  const brand = DB.brands.find(b => b.id === brandId);
  const modelGrid = document.getElementById('model-grid');
  modelGrid.innerHTML = brand.models.map(m => `
    <div class="card" onclick="applyModel('${m.name}', '${m.img}')">${m.name}</div>
  `).join('');
}

function applyModel(name, img) {
  document.getElementById('phone-display').style.backgroundImage = `url('${img}')`;
  document.getElementById('model-name').innerText = name;
}

function applySkin(img) {
  document.getElementById('skin-layer').style.backgroundImage = `url('${img}')`;
}

init();
</script>
