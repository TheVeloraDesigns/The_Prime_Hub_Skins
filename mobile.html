<style>
  :root {
    --gold: #C9A96E;
    --dark: #121212;
    --card-bg: #ffffff;
    --text: #1a1a1a;
  }
  
  body { 
    background: #f4f4f4; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }

  .psh-wrap { max-width: 500px; margin: 0 auto; padding: 20px; }

  /* Header Mockup */
  .psh-header {
    background: var(--dark);
    color: white;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  /* Progress Steps */
  .psh-steps { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .step-dot { 
    width: 30px; height: 30px; border-radius: 50%; background: #ddd; 
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .step-dot.active { background: var(--gold); color: white; }

  /* Brand & Model Cards */
  .brand-grid, .model-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
  }
  
  .brand-card, .model-card {
    background: var(--card-bg);
    border: 1px solid #eee;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
  }

  .brand-card.selected, .model-card.selected {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold);
  }

  /* THE DEVICE PREVIEW MOCKUP */
  .preview-card {
    background: white;
    border-radius: 30px;
    padding: 30px;
    text-align: center;
    margin-top: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
  }

  .preview-phone {
    width: 140px;
    height: 280px;
    background: #222;
    border-radius: 25px;
    margin: 0 auto 20px;
    border: 6px solid #333;
    position: relative;
    overflow: hidden;
  }

  .preview-phone-skin {
    position: absolute;
    inset: 0;
    transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Button Mockup */
  .psh-btn {
    background: var(--dark);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 12px;
    font-weight: 600;
    width: 100%;
    margin-top: 20px;
    cursor: pointer;
  }
</style>

<div class="psh-wrap">
  <div class="psh-header">
    <h2 style="margin:0; font-size: 18px;">Prime Skin Hub</h2>
    <p style="font-size:12px; opacity: 0.7;">Premium Device Visualizer</p>
  </div>

  <div class="psh-section-label">01. Select Brand</div>
  <div class="brand-grid" id="brandGrid"></div>

  <div id="modelSection" style="display:none; margin-top:30px;">
    <div class="psh-section-label">02. Select Model</div>
    <div class="model-grid" id="modelGrid"></div>
  </div>

  <div id="previewSection" style="display:none;">
    <div class="preview-card">
      <div class="preview-phone">
        <div class="preview-phone-skin" id="previewSkin"></div>
      </div>
      <h3 id="prevModelName" style="margin:10px 0 5px;">Model</h3>
      <p id="prevPrice" style="color: var(--gold); font-weight: bold; font-size: 20px;">₹0</p>
      <button class="psh-btn">Get This Skin</button>
    </div>
  </div>
</div>

<script>
// I kept your existing logic so the functionality doesn't break!
const DATA = {
  brands: [
    { id: "apple", name: "Apple", models: [{id: "ip17", name: "iPhone 17 Pro", price: "999"}] },
    { id: "samsung", name: "Samsung", models: [{id: "s26", name: "S26 Ultra", price: "1099"}] }
  ]
};

function renderBrands() {
  document.getElementById('brandGrid').innerHTML = DATA.brands.map(b => `
    <div class="brand-card" onclick="selectBrand('${b.id}')">
      <strong>${b.name}</strong>
    </div>
  `).join('');
}

function selectBrand(id) {
  const brand = DATA.brands.find(b => b.id === id);
  document.getElementById('modelSection').style.display = 'block';
  document.getElementById('modelGrid').innerHTML = brand.models.map(m => `
    <div class="model-card" onclick="selectModel('${m.name}', '${m.price}')">
      ${m.name}
    </div>
  `).join('');
}

function selectModel(name, price) {
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('prevModelName').innerText = name;
  document.getElementById('prevPrice').innerText = '₹' + price;
  document.getElementById('previewSkin').style.background = '#C9A96E'; // Default Gold Mockup
}

renderBrands();
</script>
