<style>
  /* ... keep your root and body styles ... */

  .phone-container {
    width: 300px; 
    height: 600px; 
    margin: 0 auto; 
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* BASE LAYER: The Phone Image */
  #phone-display {
    position: absolute;
    width: 100%;
    height: 100%;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 1; /* Behind the skin */
  }

  /* SKIN LAYER: The Texture */
  #skin-layer {
    position: absolute;
    width: 72%; /* Adjusted to fit inside the screen area roughly */
    height: 85%;
    background-size: cover;
    transition: 0.4s ease;
    border-radius: 30px;
    z-index: 2; /* On top of the phone */
    opacity: 0.8;
    pointer-events: none; /* Let's you click through it */
  }
</style>

<script>
const DB = {
  brands: [
    { id: 'apple', name: 'Apple', models: [
        { name: 'iPhone 15 Pro', img: 'image_d2711a.png' },
        { name: 'iPhone 15 Pro Max', img: 'image_d2711a.png' }
    ]},
    { id: 'samsung', name: 'Samsung', models: [
        { name: 'S24 Ultra', img: 'image_d269b7.png' },
        { name: 'S23 Ultra', img: 'image_d269b7.png' }
    ]},
    { id: 'google', name: 'Google', models: [
        { name: 'Pixel 8 Pro', img: 'image_d26656.png' },
        { name: 'Pixel 7 Pro', img: 'image_d265fd.png' }
    ]}
  ],
  skins: [
    { name: 'Carbon Fibre', img: 'download.jpg' },
    { name: 'Titanium Gold', img: 'Screenshot 2026-05-16 at 12.29.58 AM.png' }
  ]
};

// Initial setup to avoid the black screen
function init() {
  renderBrands();
  renderSkins();
  // Set a default model so it's not empty on load
  applyModel('iPhone 15 Pro', 'image_d2711a.png');
}

function selectBrand(brandId) {
  const brand = DB.brands.find(b => b.id === brandId);
  const modelGrid = document.getElementById('model-grid');
  modelGrid.innerHTML = brand.models.map(m => `
    <div class="card" onclick="applyModel('${m.name}', '${m.img}')">${m.name}</div>
  `).join('');
}

function applyModel(name, img) {
  // We use the full path to make sure GitHub finds it
  document.getElementById('phone-display').style.backgroundImage = `url('${img}')`;
  document.getElementById('model-name').innerText = name;
}

function applySkin(img) {
  document.getElementById('skin-layer').style.backgroundImage = `url('${img}')`;
}

init();
</script>
