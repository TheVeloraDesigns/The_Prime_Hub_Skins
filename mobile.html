<style>
  :root {
    --gold: #C4A484;
    --dark: #0f0f0f;
    --card: #1a1a1a;
    --border: rgba(255,255,255,0.1);
  }

  body { 
    background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
    margin: 0; padding: 20px; display: flex; justify-content: center;
  }

  .app-container {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    width: 100%; max-width: 1000px;
  }

  /* VISUALIZER BOX */
  .preview-pane { position: sticky; top: 20px; height: 600px; text-align: center; }
  
  .phone-frame {
    width: 280px; height: 560px; margin: 0 auto; position: relative;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    z-index: 1;
  }

  /* The Skin Overlay */
  #skin-overlay {
    position: absolute;
    top: 5%; left: 5%; width: 90%; height: 90%;
    background-size: cover; background-position: center;
    border-radius: 35px;
    opacity: 0.85;
    z-index: 2; /* Sits on top of the phone */
    transition: 0.5s ease;
  }

  /* UI BUTTONS */
  .section-label { color: var(--gold); font-size: 12px; font-weight: bold; margin: 25px 0 10px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  
  .btn {
    background: var(--card); border: 1px solid var(--border);
    padding: 15px; border-radius: 12px; color: #fff; cursor: pointer; text-align: center;
  }
  .btn:hover { border-color: var(--gold); }
  
  .texture-btn {
    height: 60px; border-radius: 10px; border: 2px solid transparent; 
    background-size: cover; cursor: pointer;
  }
</style>

<div class="app-container">
  <div class="preview-pane">
    <div id="phone-main" class="phone-frame">
        <div id="skin-overlay"></div>
    </div>
    <h2 id="display-name" style="margin-top:20px;">iPhone 15 Pro</h2>
  </div>

  <div class="selection-pane">
    <h1 style="font-size: 24px;">Prime Skin Hub</h1>
    
    <div class="section-label">01. Select Brand</div>
    <div class="grid" id="brand-btns"></div>

    <div class="section-label">02. Select Model</div>
    <div class="grid" id="model-btns"></div>

    <div class="section-label">03. Choose Skin</div>
    <div class="grid" id="skin-btns"></div>
  </div>
</div>

<script>
const DB = {
  brands: [
    { id: 'apple', name: 'Apple', models: [
        { name: 'iPhone 15 Pro', img: 'image_d2711a.png' },
        { name: 'iPhone 15 Pro Max', img: 'image_d2711a.png' }
    ]},
    { id: 'samsung', name: 'Samsung', models: [
        { name: 'S24 Ultra', img: 'image_d269b7.png' },
        { name: 'S23 Ultra', img: 'image_d269b7.png' }
    ]},
    { id: 'google', name: 'Google', models: [
        { name: 'Pixel 8 Pro', img: 'image_d26656.png' },
        { name: 'Pixel 7 Pro', img: 'image_d265fd.png' }
    ]}
  ],
  skins: [
    { name: 'Carbon Fibre', img: 'download.jpg' },
    { name: 'Titanium Gold', img: 'Screenshot 2026-05-16 at 12.29.58 AM.png' }
  ]
};

function init() {
  // Load Brands
  document.getElementById('brand-btns').innerHTML = DB.brands.map(b => 
    `<div class="btn" onclick="showModels('${b.id}')">${b.name}</div>`
  ).join('');

  // Load Skins
  document.getElementById('skin-btns').innerHTML = DB.skins.map(s => 
    `<div class="texture-btn" style="background-image: url('${s.img}')" onclick="applySkin('${s.img}')"></div>`
  ).join('');

  // Load a default view so it's not black
  applyModel('iPhone 15 Pro', 'image_d2711a.png');
}

function showModels(brandId) {
  const brand = DB.brands.find(b => b.id === brandId);
  document.getElementById('model-btns').innerHTML = brand.models.map(m => 
    `<div class="btn" onclick="applyModel('${m.name}', '${m.img}')">${m.name}</div>`
  ).join('');
}

function applyModel(name, imgPath) {
  document.getElementById('phone-main').style.backgroundImage = `url('${imgPath}')`;
  document.getElementById('display-name').innerText = name;
}

function applySkin(skinImg) {
  document.getElementById('skin-overlay').style.backgroundImage = `url('${skinImg}')`;
}

init();
</script>
