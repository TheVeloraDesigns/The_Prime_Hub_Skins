<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --gold: #C4A484;
    --dark: #0a0a0a;
    --card: #141414;
    --border: rgba(255,255,255,0.1);
  }

  body { 
    background: var(--dark); color: #fff; font-family: 'Inter', sans-serif; 
    margin: 0; padding: 20px; display: flex; justify-content: center;
  }

  .app-container {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    width: 100%; max-width: 1100px; padding: 40px;
  }

  /* STICKY PREVIEW PANE */
  .preview-pane { position: sticky; top: 40px; height: 600px; text-align: center; }
  
  .visualizer-display {
    width: 380px; height: 500px; margin: 0 auto;
    background-size: contain; background-repeat: no-repeat; background-position: center;
    transition: background-image 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
  }

  /* SELECTION UI */
  .section-label { color: var(--gold); font-size: 11px; font-weight: 800; margin: 30px 0 12px; text-transform: uppercase; letter-spacing: 1px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  
  .btn {
    background: var(--card); border: 1px solid var(--border);
    padding: 16px; border-radius: 12px; color: #fff; cursor: pointer; 
    text-align: center; font-size: 14px; transition: 0.2s;
    touch-action: manipulation;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover { border-color: var(--gold); background: rgba(196, 164, 132, 0.05); }
  .btn.active { border-color: var(--gold); background: var(--gold); color: #000; font-weight: bold; }

  @media (max-width: 600px) {
    .app-container {
      grid-template-columns: 1fr; 
      padding: 15px;
      gap: 10px;
    }
    .preview-pane {
      position: relative; 
      top: 0;
      height: auto;
      margin-bottom: 20px;
    }
    .visualizer-display {
      width: 100%;
      max-width: 300px; 
      height: 400px;
    }
    .grid {
      grid-template-columns: 1fr 1fr; 
    }
    h1 { font-size: 22px; }
  }
</style>

<div class="app-container">
  <div class="preview-pane">
    <div id="main-display" class="visualizer-display"></div>
    <h2 id="config-label" style="margin-top:20px; font-size: 18px; letter-spacing: 1px;">iPhone 15 Pro</h2>
    <p id="skin-label" style="opacity: 0.5; font-size: 14px;">Select a Skin</p>
  </div>

  <div class="selection-pane">
    <h1 style="font-size: 28px; margin-bottom: 5px;">Prime Skin Hub</h1>
    <p style="opacity: 0.4; font-size: 13px;">Custom Hardware Visualizer</p>
    
    <div class="section-label">01. Select Brand</div>
    <div class="grid" id="brand-btns"></div>

    <div class="section-label">02. Select Model</div>
    <div class="grid" id="model-btns"></div>

    <div class="section-label">03. Choose Texture</div>
    <div class="grid" id="skin-btns"></div>
    
    <button style="margin-top: 40px; width: 100%; background: var(--gold); color: #000; padding: 20px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer;">
        ADD TO COLLECTION — ₹999
    </button>
  </div>
</div>

<script>
const STORE = {
  apple: {
    base: "https://www.capesindia.com/cdn/shop/files/iphone-15-pro-glass-back_matte-transparent-guard_ccf55ab5-b3c5-4b78-b9d5-9242130bf99a.jpg?v=1747221684&width=800",
    models: ["iPhone 15 Pro", "iPhone 15 Pro Max"],
    skins: [
      { name: "Carbon Fibre", url: "https://www.capesindia.com/cdn/shop/products/iphone-15-pro-max-glass-back_carbon-fibre-black_2379de7c-e561-4ae3-876b-2c36bf3547f7.jpg?v=1747221662&width=800" },
      { name: "Lava", url: "https://www.capesindia.com/cdn/shop/files/iphone-15-pro-max-glass-back_lava_a017cbf6-fb06-49b2-8354-c71927ccca4a.jpg?v=1747221663&width=800" }
    ]
  },
  samsung: {
    base: "https://www.capesindia.com/cdn/shop/files/samsung-galaxy-s24-ultra-glass-back_matte-transparent-guard_d1244db8-2f36-46af-b55b-bff84d8091ef.jpg?v=1747220810&width=800",
    models: ["S24 Ultra", "S23 Ultra"],
    skins: [
      { name: "Black Camo", url: "https://www.capesindia.com/cdn/shop/products/samsung-galaxy-s24-ultra-glass-back_black-camo.jpg?v=1747220808&width=800" },
      { name: "Walnut", url: "https://www.capesindia.com/cdn/shop/products/samsung-galaxy-s24-glass-back_walnut.jpg?v=1747220826&width=800" }
    ]
  }
};

let currentBrand = 'apple';

function init() {
  const brandArea = document.getElementById('brand-btns');
  brandArea.innerHTML = Object.keys(STORE).map(key => 
    `<div class="btn ${currentBrand === key ? 'active' : ''}" onclick="selectBrand('${key}')">${key.toUpperCase()}</div>`
  ).join('');

  selectBrand(currentBrand);
}

function selectBrand(key) {
  currentBrand = key;
  const brandData = STORE[key];
  
  // Render Models
  document.getElementById('model-btns').innerHTML = brandData.models.map(m => 
    `<div class="btn" onclick="updatePreview('${brandData.base}', '${m}')">${m}</div>`
  ).join('');

  // Render Skins
  document.getElementById('skin-btns').innerHTML = brandData.skins.map(s => 
    `<div class="btn" onclick="updatePreview('${s.url}', null, '${s.name}')">${s.name}</div>`
  ).join('');

  // Default Load
  updatePreview(brandData.base, brandData.models[0]);
  
  // Highlight active brand
  document.querySelectorAll('#brand-btns .btn').forEach(btn => {
    btn.classList.toggle('active', btn.innerText.toLowerCase() === key);
  });
}

function updatePreview(imgUrl, modelName, skinName) {
  document.getElementById('main-display').style.backgroundImage = `url('${imgUrl}')`;
  if(modelName) document.getElementById('config-label').innerText = modelName;
  if(skinName) document.getElementById('skin-label').innerText = skinName;
}

init();
</script>
