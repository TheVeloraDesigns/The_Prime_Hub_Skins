<style>
  :root {
    --gold: #C9A96E;
    --dark-bg: #0a0a0a;
    --card-bg: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.1);
  }

  body {
    background-color: var(--dark-bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 40px 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
    color: var(--gold);
  }

  /* THE PHONE MOCKUP */
  .device-preview {
    position: relative;
    width: 220px;
    height: 450px;
    background: #111;
    border: 12px solid #222;
    border-radius: 40px;
    margin: 0 auto 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    overflow: hidden;
  }

  /* This is the "Skin" that changes */
  #skin-overlay {
    position: absolute;
    inset: 0;
    background: var(--gold);
    opacity: 0.8;
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .option-group {
    background: var(--card-bg);
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 24px;
    margin-top: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .btn-choice {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: #fff;
    padding: 15px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 500;
  }

  .btn-choice:hover {
    background: var(--gold);
    color: #000;
  }

  .price-section {
    text-align: center;
    margin-top: 30px;
  }

  .price {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 15px;
  }

  .buy-now {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    padding: 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
  }
</style>

<div class="container">
  <div class="header">
    <h1>Prime Skin Hub</h1>
    <p style="opacity:0.5; font-size:12px;">Premium Device Customizer</p>
  </div>

  <div class="device-preview">
    <div id="skin-overlay"></div>
  </div>

  <div class="option-group">
    <p style="font-size: 14px; margin-bottom: 15px; opacity: 0.7;">Select Texture</p>
    <div class="grid">
      <button class="btn-choice" onclick="changeSkin('#C9A96E')">Gold Titanium</button>
      <button class="btn-choice" onclick="changeSkin('#1a1a1a')">Carbon Fiber</button>
      <button class="btn-choice" onclick="changeSkin('#8d8d8d')">Brushed Steel</button>
      <button class="btn-choice" onclick="changeSkin('#2C1A0E')">Midnight Leather</button>
    </div>
  </div>

  <div class="price-section">
    <div class="price">₹999</div>
    <button class="buy-now">Add to Collection</button>
  </div>
</div>

<script>
  function changeSkin(color) {
    document.getElementById('skin-overlay').style.backgroundColor = color;
  }
</script>
